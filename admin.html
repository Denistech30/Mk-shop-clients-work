<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MK Shop – Admin</title>
<link rel="icon" type="image/jpeg" href="logo.jpeg"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gl:#e8c97a;--gd:#9a7b2f;--dk:#080808;--dk2:#111111;--dk3:#1a1a1a;--dk4:#222222;--w:#fff;--gr:#777;--red:#e53935;--rdk:#b71c1c;--grn:#25d366;--grnd:#128c7e;--r:14px;--rs:8px;--shadow:0 4px 24px rgba(0,0,0,.5);--shadow-gold:0 4px 20px rgba(201,168,76,.25)}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--dk);color:var(--w);min-height:100vh;padding-bottom:6rem}
.hdr{background:linear-gradient(135deg,var(--dk2) 0%,#1a1200 100%);border-bottom:1px solid rgba(201,168,76,.3);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.6)}
.hdr img{height:36px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 6px rgba(0,0,0,.6))}
.hdr-text h1{font-size:.88rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px}
.hdr-text p{font-size:.65rem;color:var(--gr);margin-top:1px}
.tab-bar{display:none;background:var(--dk2);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:65px;z-index:199;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:130px;padding:.85rem .75rem;font-size:.78rem;font-weight:600;color:var(--gr);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;transition:color .2s,border-color .2s,background .2s;white-space:nowrap}
.tab-btn:hover{color:var(--w);background:rgba(255,255,255,.03)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.05)}
.tab-btn .crown{color:#f59e0b}
.tab-panel{display:none}.tab-panel.active{display:block}
.wrap{max-width:540px;margin:0 auto;padding:1.5rem 1rem}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem;text-align:center;padding:2rem 1rem}
.login-logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--gold);box-shadow:0 0 40px rgba(201,168,76,.15)}
.login-title{font-size:1.4rem;font-weight:800;letter-spacing:-.5px}
.login-sub{font-size:.84rem;color:var(--gr);margin-top:.25rem}
.login-card{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:1.75rem;width:100%;max-width:320px;box-shadow:var(--shadow)}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
label{font-size:.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
label .opt{color:var(--gr);font-weight:400;text-transform:none;font-size:.7rem}
input,select,textarea{width:100%;background:var(--dk3);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--rs);color:var(--w);font-size:.95rem;padding:.82rem .95rem;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}
select option{background:var(--dk3)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
.btn{width:100%;padding:.9rem;border-radius:var(--r);font-size:.95rem;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;letter-spacing:.2px}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--dk);box-shadow:var(--shadow-gold)}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 28px rgba(201,168,76,.4);transform:translateY(-1px)}
.btn-dark{background:var(--dk3);color:var(--w);border:1.5px solid rgba(255,255,255,.1)}
.btn-dark:hover:not(:disabled){border-color:rgba(255,255,255,.2);background:var(--dk4)}
.btn-red{background:linear-gradient(135deg,var(--red),var(--rdk));color:#fff;box-shadow:0 4px 16px rgba(229,57,53,.3)}
.btn-red:hover:not(:disabled){box-shadow:0 6px 24px rgba(229,57,53,.45);transform:translateY(-1px)}
.btn-sm{padding:.42rem .8rem;font-size:.76rem;border-radius:var(--rs);width:auto}
.btn-wa-full{background:linear-gradient(135deg,var(--grn),var(--grnd));color:#fff;border:none;border-radius:var(--r);padding:.85rem 1.5rem;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.5rem;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(37,211,102,.3)}
.btn-wa-full:hover{box-shadow:0 6px 24px rgba(37,211,102,.45);transform:translateY(-1px)}
.status{border-radius:var(--r);padding:.9rem 1rem;font-size:.88rem;font-weight:600;text-align:center;display:none;margin-bottom:1rem;line-height:1.5}
.status.error{background:rgba(229,57,53,.12);border:1.5px solid rgba(229,57,53,.35);color:#ff7070}
.status.success{background:rgba(37,211,102,.1);border:1.5px solid rgba(37,211,102,.3);color:#69f0ae}
.status.loading{background:rgba(201,168,76,.08);border:1.5px solid rgba(201,168,76,.25);color:var(--gl)}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.prog-wrap{background:rgba(255,255,255,.06);border-radius:50px;height:4px;overflow:hidden;margin-top:.6rem;display:none}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--gd),var(--gold),var(--gl));border-radius:50px;width:0%;transition:width .3s}
hr.div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:1.5rem 0}
.sec-lbl{font-size:.66rem;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:1rem}
.notice{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:var(--r);padding:.9rem 1rem;font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.65;margin-bottom:1.3rem}
.notice strong{color:var(--gold)}
.edit-banner{background:rgba(201,168,76,.1);border:1.5px solid rgba(201,168,76,.4);border-radius:var(--r);padding:.8rem 1rem;display:none;align-items:center;gap:.7rem;margin-bottom:1rem;font-size:.84rem;color:var(--gl);font-weight:600}
.edit-banner button{margin-left:auto;background:none;border:1px solid rgba(201,168,76,.35);color:var(--gold);border-radius:var(--rs);padding:.28rem .65rem;font-size:.74rem;cursor:pointer}
.photo-area{border:2px dashed rgba(201,168,76,.3);border-radius:var(--r);padding:1.6rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;background:rgba(201,168,76,.02)}
.photo-area:hover,.photo-area.has{border-color:var(--gold);background:rgba(201,168,76,.06)}
.photo-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;padding:0;border:none;background:none}
.photo-area i{font-size:2rem;color:var(--gold);margin-bottom:.5rem;display:block}
.photo-area p{font-size:.85rem;color:rgba(255,255,255,.55)}
.photo-area small{font-size:.7rem;color:var(--gr);margin-top:.25rem;display:block}
#imgPreview{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);margin-top:.8rem;display:none;border:1px solid rgba(255,255,255,.08)}
.prod-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.prod-hdr h2{font-size:1rem;font-weight:700}
.prod-count{font-size:.72rem;color:var(--gr);background:var(--dk3);padding:.22rem .65rem;border-radius:50px;border:1px solid rgba(255,255,255,.07)}
.prod-list{display:flex;flex-direction:column;gap:.75rem}
.prod-card{background:var(--dk2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);overflow:hidden;display:flex;transition:border-color .2s,box-shadow .2s}
.prod-card:hover{border-color:rgba(201,168,76,.25);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.prod-img{width:88px;min-width:88px;height:108px;background:var(--dk3);display:flex;align-items:center;justify-content:center;color:var(--gr);font-size:1.4rem;flex-shrink:0}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;padding:.85rem .9rem;display:flex;flex-direction:column;gap:.22rem;min-width:0}
.prod-name{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:.66rem;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.prod-price{font-size:.85rem;font-weight:700;color:var(--gl);margin-top:.1rem}
.prod-actions{display:flex;gap:.4rem;margin-top:auto;padding-top:.5rem}
.prod-loading{text-align:center;padding:2.5rem;color:var(--gr);font-size:.86rem}
.prod-empty{text-align:center;padding:2.5rem 1rem;color:var(--gr);font-size:.86rem;border:1px dashed rgba(255,255,255,.08);border-radius:var(--r)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(4px)}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--dk2);border:1.5px solid rgba(229,57,53,.35);border-radius:18px;padding:2rem 1.5rem;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.confirm-box i{font-size:2.5rem;color:var(--red);margin-bottom:.9rem;display:block}
.confirm-box h3{font-size:1.05rem;font-weight:700;margin-bottom:.4rem}
.confirm-box p{font-size:.83rem;color:var(--gr);margin-bottom:1.4rem;line-height:1.55}
.confirm-actions{display:flex;gap:.65rem}
.confirm-actions .btn{flex:1;padding:.8rem}
.prem-lock{display:flex;flex-direction:column;align-items:center;text-align:center;padding:3rem 1.5rem;gap:1.4rem}
.lock-ring{position:relative;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);border:2px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(201,168,76,.12);animation:pulse-ring 3s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 30px rgba(201,168,76,.1)}50%{box-shadow:0 0 60px rgba(201,168,76,.25)}}
.lock-ring i{font-size:2.8rem;color:var(--gold)}
.prem-lock h2{font-size:1.35rem;font-weight:800;letter-spacing:-.3px}
.prem-lock .prem-sub{font-size:.85rem;color:var(--gr);line-height:1.65;max-width:300px}
.prem-divider{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px}
.code-wrap{width:100%;max-width:340px;background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.25rem}
.code-wrap label{display:block;font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:.6rem}
.code-row{display:flex;gap:.5rem}
.code-row input{flex:1;font-family:monospace;letter-spacing:1px;font-size:.9rem}
.code-row .btn-activate{white-space:nowrap;padding:.82rem 1.1rem;border-radius:var(--rs);background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--dk);border:none;font-weight:800;cursor:pointer;font-size:.85rem;transition:all .2s;box-shadow:var(--shadow-gold)}
.code-row .btn-activate:hover{box-shadow:0 6px 24px rgba(201,168,76,.45);transform:translateY(-1px)}
.settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.07)}
.settings-header h2{font-size:1.05rem;font-weight:800;display:flex;align-items:center;gap:.5rem}
.settings-header h2 i{color:var(--gold)}
.lock-btn{background:none;border:1px solid rgba(255,255,255,.12);color:var(--gr);border-radius:50px;padding:.3rem .85rem;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:all .2s}
.lock-btn:hover{border-color:rgba(255,255,255,.25);color:var(--w)}
.settings-section{background:var(--dk2);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:1.25rem;margin-bottom:1rem;transition:border-color .2s}
.settings-section:hover{border-color:rgba(201,168,76,.15)}
.settings-section h3{font-size:.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:1.1rem;display:flex;align-items:center;gap:.45rem;padding-bottom:.75rem;border-bottom:1px solid rgba(255,255,255,.05)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.toggle-row:last-child{border-bottom:none}
.toggle-row span{font-size:.88rem;color:var(--w)}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--dk4);border-radius:50px;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.1)}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle input:checked+.toggle-slider{background:var(--gold);border-color:var(--gold)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.celebration{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);flex-direction:column;gap:1.5rem;text-align:center}
.celebration.show{display:flex}
.celeb-box{background:linear-gradient(135deg,#1a1200,#0a0a0a);border:2px solid var(--gold);border-radius:24px;padding:2.5rem 2rem;max-width:320px;width:90%;box-shadow:0 0 80px rgba(201,168,76,.3),0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;animation:celeb-pop .5s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes celeb-pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.celeb-box::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(201,168,76,.15) 0%,transparent 60%);pointer-events:none}
.celeb-icon{font-size:4rem;margin-bottom:.5rem;animation:bounce-icon 1s ease infinite alternate}
@keyframes bounce-icon{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-8px) rotate(5deg)}}
.celeb-title{font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:-.5px;margin-bottom:.4rem}
.celeb-sub{font-size:.88rem;color:rgba(255,255,255,.7);line-height:1.6}
.celeb-close{margin-top:1.25rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--dk);border:none;border-radius:50px;padding:.75rem 2rem;font-size:.92rem;font-weight:800;cursor:pointer;box-shadow:var(--shadow-gold);transition:all .2s}
.celeb-close:hover{box-shadow:0 6px 28px rgba(201,168,76,.5);transform:translateY(-2px)}
#confettiCanvas{position:fixed;inset:0;z-index:99998;pointer-events:none;display:none}
</style>
</head>
<body>
